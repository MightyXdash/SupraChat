name: Cross-Platform Validation

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  app-checks:
    name: App checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build renderer
        run: npm run build

      - name: Run updater tests
        run: npm run test:updater

      - name: Validate full runtime asset contract
        run: npm run runtime:check:all

  packaged-smoke:
    name: Packaged smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - windows-latest
          - ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate current-platform runtime
        run: npm run runtime:check

      - name: Build renderer
        run: npm run build
